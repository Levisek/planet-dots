<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dots — Solar System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; font-family: 'Press Start 2P', ui-monospace, monospace; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #hud { position: fixed; bottom: 8px; left: 12px; color: #888; font: 9px/1.6 'Press Start 2P', monospace; user-select: none; pointer-events: none; }
    #stats { position: fixed; top: 8px; right: 12px; color: #6bff6b; font: 10px/1.4 ui-monospace, monospace; user-select: none; pointer-events: none; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      font: 9px/1.4 'Press Start 2P', monospace;
      letter-spacing: 0.04em;
      white-space: nowrap;
      transform: translate(-50%, -130%);
      opacity: 0;
      transition: opacity 0.12s;
      user-select: none;
      z-index: 10;
    }
    #tooltip.visible { opacity: 1; }
    #infoPanel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 360px;
      max-height: 75vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #eee;
      font: 10px/1.7 'Press Start 2P', monospace;
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      transform: translateX(420px);
      opacity: 0;
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
      z-index: 20;
    }
    #infoPanel.visible { transform: translateX(0); opacity: 1; }
    #infoPanel h2 { margin: 0 0 8px; font-size: 14px; letter-spacing: 0.06em; line-height: 1.4; }
    #infoPanel .tagline { color: #aaa; margin: 0 0 14px; font-size: 8px; line-height: 1.6; }
    #infoPanel .close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
      padding: 2px 8px;
      line-height: 1;
    }
    #infoPanel .close:hover { color: #fff; }
    #infoPanel table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    #infoPanel td { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 8px; line-height: 1.6; }
    #infoPanel td.label { color: #888; width: 45%; }
    #infoPanel td.value { color: #fff; text-align: right; }
    #infoPanel .funFact {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(255, 200, 80, 0.08);
      border-left: 3px solid #ffc850;
      font-size: 8px;
      line-height: 1.6;
      color: #ddd;
    }
    #infoPanel .scaleToggle {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 8px;
    }
    #infoPanel .scaleToggle input { cursor: pointer; transform: scale(1.3); }
    #infoPanel .scaleHint { color: #888; font-size: 7px; margin-top: 4px; text-align: right; line-height: 1.6; }
    .moonLabel {
      position: fixed;
      pointer-events: none;
      color: rgba(255, 255, 255, 0.55);
      font: 7px/1 'Press Start 2P', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transform: translate(-50%, -180%);
      user-select: none;
      white-space: nowrap;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
      z-index: 8;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .moonLabel.visible { opacity: 1; }
    .moonLabel .dist { color: rgba(180, 200, 255, 0.7); font-size: 6px; margin-left: 4px; }
    .planetLabel {
      position: fixed;
      pointer-events: auto;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.85);
      font: 8px/1 'Press Start 2P', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transform: translate(-50%, -180%);
      user-select: none;
      white-space: nowrap;
      text-shadow: 0 0 6px rgba(0, 0, 0, 1);
      z-index: 9;
      transition: color 0.15s;
    }
    .planetLabel:hover { color: #fff; }
    #bodyList {
      position: fixed;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      max-height: 90vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 12px;
      font: 8px/1.6 'Press Start 2P', monospace;
      color: #aaa;
      user-select: none;
      z-index: 11;
    }
    #bodyList .group { color: #666; margin-top: 8px; font-size: 7px; }
    #bodyList .group:first-child { margin-top: 0; }
    #bodyList .item { cursor: pointer; padding: 3px 6px; transition: color 0.1s, background 0.1s; }
    #bodyList .item:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
    #bodyList .item.active { color: #ffc850; background: rgba(255, 200, 80, 0.12); }
  </style>
</head>
<body>
  <h1 style="position:absolute;left:-9999px;">Sluneční soustava z teček</h1>
  <main aria-label="3D vizualizace sluneční soustavy">
    <canvas id="canvas"></canvas>
  </main>
  <div id="hud">R restart · Space pauza</div>
  <div id="stats">fps — · tick — ms · rot — ms</div>
  <div id="tooltip"></div>
  <div id="infoPanel"></div>
  <div id="moonLabels"></div>
  <div id="topToggles" style="position:fixed;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:11;">
    <button id="modePochopeni" class="topBtn active" data-mode="pochopeni" title="Vizuálně srozumitelný režim — komprese vzdáleností a period">POCHOPENÍ</button>
    <button id="modeFyzikalni" class="topBtn" data-mode="fyzikalni" title="Fyzikálně přesný — real proporce vzdáleností a period">FYZIKÁLNÍ</button>
    <button id="toggleLighting" class="topBtn" title="Přepne realistické osvětlení (den/noc strana)">STÍNY: VYP</button>
  </div>
  <style>
    .topBtn {
      background:rgba(0,0,0,0.7); color:#aaa; border:1px solid #444; padding:6px 10px;
      cursor:pointer; font-family: 'Press Start 2P', monospace; font-size: 8px; letter-spacing: 0.05em;
    }
    .topBtn:hover { color:#fff; border-color:#888; }
    .topBtn.active { color:#ffc850; border-color:#ffc850; background:rgba(255,200,80,0.12); }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
