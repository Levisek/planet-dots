<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dots — Solar System</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #hud { position: fixed; bottom: 8px; left: 12px; color: #888; font: 11px/1.4 system-ui, sans-serif; user-select: none; pointer-events: none; }
    #stats { position: fixed; top: 8px; right: 12px; color: #6bff6b; font: 12px/1.4 ui-monospace, monospace; user-select: none; pointer-events: none; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      font: 13px/1.2 system-ui, sans-serif;
      letter-spacing: 0.04em;
      white-space: nowrap;
      transform: translate(-50%, -130%);
      opacity: 0;
      transition: opacity 0.12s;
      user-select: none;
      z-index: 10;
    }
    #tooltip.visible { opacity: 1; }
    #infoPanel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 360px;
      max-height: 75vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #eee;
      font: 14px/1.5 system-ui, sans-serif;
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      transform: translateX(420px);
      opacity: 0;
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
      z-index: 20;
    }
    #infoPanel.visible { transform: translateX(0); opacity: 1; }
    #infoPanel h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.06em; }
    #infoPanel .tagline { color: #aaa; font-style: italic; margin: 0 0 14px; font-size: 13px; }
    #infoPanel .close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
      padding: 2px 8px;
      line-height: 1;
    }
    #infoPanel .close:hover { color: #fff; }
    #infoPanel table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    #infoPanel td { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; }
    #infoPanel td.label { color: #888; width: 45%; }
    #infoPanel td.value { color: #fff; text-align: right; }
    #infoPanel .funFact {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(255, 200, 80, 0.08);
      border-left: 3px solid #ffc850;
      font-size: 13px;
      font-style: italic;
      color: #ddd;
    }
    #infoPanel .scaleToggle {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    #infoPanel .scaleToggle input { cursor: pointer; transform: scale(1.3); }
    #infoPanel .scaleHint { color: #888; font-size: 11px; margin-top: 4px; text-align: right; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud">R restart · Space pauza</div>
  <div id="stats">fps — · tick — ms · rot — ms</div>
  <div id="tooltip"></div>
  <div id="infoPanel"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
