<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dots — Solar System</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #hud { position: fixed; bottom: 8px; left: 12px; color: #888; font: 11px/1.4 system-ui, sans-serif; user-select: none; pointer-events: none; }
    #stats { position: fixed; top: 8px; right: 12px; color: #6bff6b; font: 12px/1.4 ui-monospace, monospace; user-select: none; pointer-events: none; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      font: 13px/1.2 system-ui, sans-serif;
      letter-spacing: 0.04em;
      white-space: nowrap;
      transform: translate(-50%, -130%);
      opacity: 0;
      transition: opacity 0.12s;
      user-select: none;
      z-index: 10;
    }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud">R restart · Space pauza</div>
  <div id="stats">fps — · tick — ms · rot — ms</div>
  <div id="tooltip"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
